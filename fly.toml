# fly.toml app configuration file
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = "spotifight" # Change this to your unique app name
primary_region = "iad" # Change to your preferred region (iad=US East)

[build]

[env]
  PORT = "8080"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"  # Keep machines running (important for WebSocket!)
  auto_start_machines = true
  min_machines_running = 1    # Always keep at least 1 machine running

[[services]]
  protocol = "tcp"
  internal_port = 8080

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["http", "tls"]

  [services.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 800

# VM resources (free tier: shared-cpu-1x with 256MB)
[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
