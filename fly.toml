# fly.toml app configuration file
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = "tchiki-tchiki"
primary_region = "iad" # Change to your preferred region (iad=US East)

[build]

[env]
  PORT = "8080"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"  # Keep machines running (important for WebSocket!)
  auto_start_machines = true
  min_machines_running = 1    # Always keep at least 1 machine running

  [http_service.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 800

  # Health check configuration
  [[http_service.checks]]
    interval = "15s"
    timeout = "10s"
    grace_period = "30s"
    method = "GET"
    path = "/api/health"

# VM resources (free tier: shared-cpu-1x with 256MB)
[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
